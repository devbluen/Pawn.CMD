name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
      - "*/*"
      - "**"
  pull_request:
    branches:
      - "*"
      - "*/*"
      - "**"
env:
  PLUGIN_VERSION: 3.5.0

jobs:
  build-windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v2

      - name: Install latest conan
        run: |
          python -m pip install --upgrade pip
          pip install conan "conan<2.0"

      - name: Generate build files
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release .. -G "Visual Studio 17 2022" -A Win32
          cmake --build . --config Release

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          mkdir dist
          copy "build/Release/pawncmd.dll" "dist/"
          copy "src/Pawn.CMD.inc" "dist/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pawncmd-${{ env.PLUGIN_VERSION }}-win32
          path: dist/

  build-linux-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive
          fetch-depth: 0

      - name: Install packages
        run: sudo apt-get install g++-multilib

      - name: Setup Python
        uses: actions/setup-python@v2

      - name: Install latest conan
        run: |
          python -m pip install --upgrade pip
          pip install conan "conan<2.0"

      - name: Generate build files
        run: mkdir build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Create artifact
        run: tar -czf pawncmd-$PLUGIN_VERSION-linux.tar.gz -C build pawncmd.so -C ../src Pawn.CMD.inc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pawncmd-${{ env.PLUGIN_VERSION }}-linux
          path: pawncmd-${{ env.PLUGIN_VERSION }}-linux.tar.gz
